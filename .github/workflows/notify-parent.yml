name: Notify parent repo

# Optional instant sync. Without PARENT_REPO_TOKEN this step passes silently.
# Parent always syncs every 15 min via scheduled workflow on Hisaab-AI.

on:
  push:
    branches: [main, master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify parent (optional)
        env:
          PAT: ${{ secrets.PARENT_REPO_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "PARENT_REPO_TOKEN not set — OK. Parent auto-syncs every 15 minutes."
            exit 0
          fi

          HTTP=$(curl -sS -o /tmp/dispatch-body.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ZubairAhmed90/Hisaab-AI/dispatches \
            -d '{"event_type":"sync-submodules","client_payload":{"source":"hisaab_ai_frontend"}}')

          if [ "$HTTP" = "204" ]; then
            echo "Parent repo dispatch OK (204)"
            exit 0
          fi

          echo "::warning::Dispatch HTTP $HTTP — parent will still sync on schedule"
          cat /tmp/dispatch-body.txt || true
          exit 0
